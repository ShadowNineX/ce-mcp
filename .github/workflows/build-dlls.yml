name: Build DLLs

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore

            - name: Build Debug
              run: dotnet build -c Debug --no-restore

            - name: Test Debug
              run: dotnet test -c Debug --no-restore --no-build --filter "TestCategory!=Live"

            - name: Build Release
              run: dotnet build -c Release --no-restore

            - name: Upload Debug bundle
              uses: actions/upload-artifact@v7
              with:
                  name: ce-mcp-debug
                  path: |
                      bin/x64/Debug/net10.0-windows/ce-mcp.dll
                      bin/x64/Debug/net10.0-windows/skills/ce-mcp/**
                  if-no-files-found: error

            - name: Upload Release bundle
              uses: actions/upload-artifact@v7
              with:
                  name: ce-mcp-release
                  path: |
                      bin/x64/Release/net10.0-windows/ce-mcp.dll
                      bin/x64/Release/net10.0-windows/skills/ce-mcp/**
                  if-no-files-found: error
